<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mortuexOS</title>
  <meta name="description" content="0xmortuex — Developer portfolio built as an interactive desktop operating system.">
  <meta name="theme-color" content="#0a0c10">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/boot.css">
  <link rel="stylesheet" href="css/os.css">
  <link rel="stylesheet" href="css/apps.css">
</head>
<body>
  <!-- Boot Screen -->
  <div class="boot" id="boot">
    <div class="boot__logo">
      <span class="boot__logo-text"><span class="accent">mortuex</span>OS</span>
    </div>
    <div class="boot__terminal" id="boot-terminal"></div>
    <div class="boot__skip">Click anywhere to skip</div>
  </div>

  <!-- Login Screen -->
  <div class="login" id="login" style="display:none">
    <div class="login__particles" id="login-particles"></div>
    <div class="login__card">
      <div class="login__avatar">
        <svg width="64" height="64" viewBox="0 0 48 48" fill="none" stroke="#6366f1" stroke-width="2"><circle cx="24" cy="16" r="8"/><path d="M8 42c0-8.837 7.163-16 16-16s16 7.163 16 16"/></svg>
      </div>
      <h2 class="login__name" id="login-name">0xmortuex</h2>
      <button class="login__btn" id="login-btn">Enter <span class="login__arrow">&rarr;</span></button>
    </div>
  </div>

  <!-- Desktop -->
  <div class="desktop" id="desktop" style="display:none">
    <div class="desktop__wallpaper" id="wallpaper"></div>
    <div class="desktop__icons" id="desktop-icons"></div>
    <div class="desktop__windows" id="windows-container"></div>

    <!-- Context Menu -->
    <div class="context-menu" id="context-menu" style="display:none">
      <div class="context-menu__item" data-action="new-notepad">New Text File</div>
      <div class="context-menu__sep"></div>
      <div class="context-menu__item" data-action="refresh">Refresh</div>
      <div class="context-menu__item" data-action="settings">Settings</div>
      <div class="context-menu__sep"></div>
      <div class="context-menu__item" data-action="source">View Source &nearr;</div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar" id="taskbar">
      <button class="taskbar__start" id="start-btn" aria-label="Start menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      </button>
      <div class="taskbar__apps" id="taskbar-apps"></div>
      <div class="taskbar__tray">
        <button class="taskbar__tray-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <span class="taskbar__tray-icon" title="Connected">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
        </span>
        <span class="taskbar__clock" id="taskbar-clock"></span>
      </div>
    </div>

    <!-- Start Menu -->
    <div class="start-menu" id="start-menu" style="display:none">
      <div class="start-menu__header">
        <span class="start-menu__user" id="start-menu-user">0xmortuex</span>
        <span class="start-menu__subtitle">Developer</span>
      </div>
      <div class="start-menu__search">
        <input type="text" class="start-menu__search-input" id="start-search" placeholder="Search apps..." autocomplete="off">
      </div>
      <div class="start-menu__grid" id="start-menu-grid"></div>
      <div class="start-menu__footer">
        <a href="https://github.com/0xmortuex" target="_blank" rel="noopener" class="start-menu__link">GitHub</a>
        <a href="mailto:fraad002@gmail.com" class="start-menu__link">Email</a>
        <a href="https://discord.com/users/0xmortuex" target="_blank" rel="noopener" class="start-menu__link">Discord</a>
      </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast" style="display:none">
      <span class="toast__text" id="toast-text"></span>
    </div>
  </div>

  <script src="js/filesystem.js"></script>
  <script src="js/windowManager.js"></script>
  <script src="js/taskbar.js"></script>
  <script src="js/shortcuts.js"></script>
  <script src="js/apps/about.js"></script>
  <script src="js/apps/projects.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/fileExplorer.js"></script>
  <script src="js/apps/browser.js"></script>
  <script src="js/apps/notepad.js"></script>
  <script src="js/apps/settings.js"></script>
  <script src="js/apps/music.js"></script>
  <script src="js/apps/contact.js"></script>
  <script src="js/os.js"></script>
</body>
</html>
